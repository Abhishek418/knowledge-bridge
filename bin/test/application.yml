spring:
  application:
    name: knowledge-bridge-test

  # Redis Configuration (disabled for tests)
  data:
    redis:
      host: localhost
      port: 6379

  # Spring AI Test Configuration
  ai:
    openai:
      api-key: test-api-key-for-testing-only
      
      # Disable audio/image to speed up tests
      audio:
        speech:
          enabled: false
        transcription:
          enabled: false
      image:
        enabled: false

    vectorstore:
      redis:
        index: test-index
        prefix: "test:"
        initialize-schema: false
